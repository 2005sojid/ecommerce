server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback -- all unknown paths return index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset cache
    location /assets/ {
        expires 30d;
        access_log off;
    }
}
