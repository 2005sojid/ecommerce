# API gateway + load balancer for two backend replicas (R8).
#
# Balancing strategies:
#  - backend_api: round-robin (uncomment least_conn if desired) -- REST stateless.
#  - backend_ws:  ip_hash -> sticky session by client IP. This is needed because
#                 ConnectionManager keeps sockets in process memory; until there is
#                 cross-replica Pub/Sub, the client must "stick" to one replica
#                 so the events for its order reach it.

upstream backend_api {
    server backend-1:8000 max_fails=3 fail_timeout=15s;
    server backend-2:8000 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

upstream backend_ws {
    ip_hash;
    server backend-1:8000 max_fails=3 fail_timeout=15s;
    server backend-2:8000 max_fails=3 fail_timeout=15s;
}

# WebSocket Upgrade map (recommended nginx pattern)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Compression
gzip on;
gzip_types application/json text/plain text/css application/javascript;
gzip_min_length 512;

# Logs in combined format -> picked up by Promtail -> Loki (Phase 10)
log_format json_combined escape=json
    '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"upstream":"$upstream_addr",'
        '"upstream_time":"$upstream_response_time",'
        '"request_time":$request_time'
    '}';
access_log /var/log/nginx/access.log json_combined;

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;

    # Healthcheck for docker-compose / external LB
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # REST API
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";   # keepalive to upstream

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # WebSocket -- separate upstream with ip_hash + long read timeout
    location /ws/ {
        proxy_pass http://backend_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 5s;
    }

    # Frontend (SPA, Vite build behind the nginx frontend container)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

